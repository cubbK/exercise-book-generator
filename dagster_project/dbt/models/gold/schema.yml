version: 2

models:
  - name: gold_chapter_enriched
    description: >
      Serving layer that joins silver chapters and books with all LLM-enriched
      gold tables. Materialised as a BigQuery table for low-latency reverse-ETL
      consumption by downstream apps.
    columns:
      - name: book_id
        description: "Stable UUID of the source book."
        tests:
          - not_null
      - name: book_title
        description: "Title of the book."
      - name: chapter_id
        description: "Stable UUID of the chapter."
        tests:
          - not_null
          - unique
      - name: chapter_order
        description: "Sequential position of the chapter within its book."
      - name: raw_text
        description: "Original extracted chapter text."
      - name: category
        description: "LLM-assigned content category."
      - name: a2_text
        description: "A2-level Swedish rewrite produced by the LLM."
      - name: a2_summary
        description: "A2-level Swedish summary produced by the LLM."
      - name: swedish_text
        description: "Full Swedish translation produced by the LLM."
      - name: source_language
        description: "Detected language of the original chapter text (ISO 639-1, from detected_language)."
