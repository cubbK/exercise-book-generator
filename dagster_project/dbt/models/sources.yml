version: 2

sources:
  - name: bronze_raw
    description: "Raw staging tables written by Dagster Python assets before deduplication."
    schema: exercise_book_bronze
    tables:
      - name: epub_registry_raw
        description: >
          All EPUB metadata rows written by the epub_registry_raw Dagster asset.
          Contains duplicates — deduplication is handled by the epub_registry
          incremental model downstream.
        meta:
          dagster:
            asset_key: ["bronze_epub_registry_raw"]
        columns:
          - name: file_id
            description: "UUID generated at ingest time."
          - name: filename
            description: "Basename of the EPUB file."
            tests:
              - not_null
          - name: storage_path
            description: "Full GCS URI (gs://bucket/path)."
          - name: sha256_hash
            description: "SHA-256 digest of the raw EPUB bytes. Used as the dedup key."
            tests:
              - not_null
          - name: uploaded_at
            description: "UTC timestamp when the row was written."
