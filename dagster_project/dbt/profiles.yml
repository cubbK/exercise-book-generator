exercise_book:
  target: dev
  outputs:
    dev:
      type: bigquery
      method: oauth # uses `gcloud auth application-default login`
      project: "{{ env_var('GCP_PROJECT') }}"
      dataset: exercise_book # default dataset; combined with +schema to form e.g. exercise_book_bronze
      threads: 4
      timeout_seconds: 300
      location: EU # change to US or a specific region if needed
      priority: interactive
